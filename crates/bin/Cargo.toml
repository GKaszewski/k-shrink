[package]
name = "k-shrink"
version = "1.0.0"
edition = "2024"
default-run = "k-shrink"

[dependencies]
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = "0.3"
tokio = { version = "1", features = ["full"] }
lib = { path = "../lib" }
platform = { path = "../platform" }
config = { path = "../config" }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
image = { version = "0.25.10", features = ["webp"] }
